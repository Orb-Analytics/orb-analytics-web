<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="assets/logo.png" />
  <title>Predictions · Orb Analytics</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .predictions-header {
      padding: 2rem 0 1.5rem;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .model-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    /* ── Pick Cards ──────────────────────────────────────────── */
    .picks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1rem;
      padding-bottom: 3rem;
    }

    .pick-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.35rem;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      transition: border-color var(--transition), box-shadow var(--transition);
      position: relative;
      overflow: hidden;
    }

    .pick-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--purple-600), var(--purple-400));
      opacity: 0;
      transition: opacity var(--transition);
    }

    .pick-card:hover {
      border-color: rgba(147,51,234,0.45);
      box-shadow: var(--glow);
    }

    .pick-card:hover::after { opacity: 1; }

    .pick-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .pick-model-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--purple-300);
      letter-spacing: 0.06em;
    }

    .pick-matchup {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.25;
    }

    .pick-main {
      background: rgba(147,51,234,0.1);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.85rem 1rem;
    }

    .pick-label {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--purple-400);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.25rem;
    }

    .pick-value {
      font-family: var(--font-display);
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
    }

    /* Confidence bar */
    .confidence-row {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .confidence-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .confidence-label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    .confidence-pct {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--purple-300);
    }

    .confidence-bar-bg {
      height: 5px;
      background: rgba(147,51,234,0.12);
      border-radius: 3px;
      overflow: hidden;
    }

    .confidence-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--purple-600), var(--purple-400));
      transition: width 0.6s ease;
    }

    .pick-meta {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .pick-notes {
      font-size: 0.8rem;
      color: var(--gray-500);
      line-height: 1.4;
      font-style: italic;
    }

    /* ── Model info bar ──────────────────────────────────────── */
    .model-info-bar {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }

    .model-info-chip {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.3rem 0.8rem;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--muted);
    }

    .model-info-chip span { color: var(--purple-300); font-weight: 600; }

    /* ── No picks ─────────────────────────────────────────────── */
    .no-picks-state {
      grid-column: 1/-1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 4rem 1.5rem;
      color: var(--gray-500);
      text-align: center;
    }

    .model-source-note {
      background: rgba(147,51,234,0.08);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .model-order-toggle {
      display: inline-flex;
      gap: 0.25rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <nav class="nav" id="main-nav"></nav>

  <main class="page">
    <div class="container">
      <div class="predictions-header">
        <div>
          <div class="section-label">ML-Powered Picks</div>
          <div class="section-title">Today's Predictions</div>
          <p style="color:var(--muted);font-size:0.85rem;margin-top:0.35rem" id="last-updated"></p>
        </div>
      </div>

      <!-- Model Tabs -->
      <div class="model-tabs" id="model-tabs"></div>

      <!-- Model Info -->
      <div class="model-source-note" id="model-source-note">
        🔗 Predictions sourced from the Orb Analytics model repos via GitHub. Updated daily.
      </div>

      <div class="model-info-bar" id="model-info-bar"></div>

      <!-- Picks Grid -->
      <div class="picks-grid" id="picks-container">
        <div class="loading-state" style="grid-column:1/-1">
          <div class="spinner"></div> Loading predictions...
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>Predictions by Orb Analytics ML Models · Not financial advice · © 2026 Orb Analytics</p>
  </footer>

  <script src="js/nav.js"></script>
  <script>
    buildNav('predictions.html');

    const MODEL_ORDER_KEY = 'orb_model_order_mode'; // 'fixed' | 'seasonal'

    const MODEL_SOURCES = {
      mlb: {
        label: 'MLB Model',
        emoji: '⚾',
        url: 'https://raw.githubusercontent.com/Orb-Analytics/MLB-Model/main/predictions.json',
        info: { features: '274', data: '18 seasons', type: 'XGBoost' },
      },
      nfl: {
        label: 'NFL Model',
        emoji: '🏈',
        url: 'https://raw.githubusercontent.com/Orb-Analytics/NFL-Model/main/predictions.json',
        info: { features: '~150', data: '3 seasons PBP', type: 'XGBoost' },
      },
      nba: {
        label: 'NBA Model',
        emoji: '🏀',
        url: 'https://raw.githubusercontent.com/Orb-Analytics/NBA-Model/main/predictions.json',
        info: { features: '~80', data: '470+ games', type: 'ML Ensemble' },
      }
    };

    const SAMPLE_DATA = {
      mlb: {
        version: 'sample',
        generated_at: new Date().toISOString(),
        picks: [
          { away_team: 'SFG', home_team: 'LAD', pick: 'LAD ML', line: -162, confidence: 0.66 },
          { away_team: 'NYY', home_team: 'BOS', pick: 'Over 8.5', line: -110, confidence: 0.61 }
        ]
      },
      nfl: {
        version: 'sample',
        generated_at: new Date().toISOString(),
        picks: [
          { away_team: 'DAL', home_team: 'PHI', pick: 'PHI -2.5', line: -115, confidence: 0.64 }
        ]
      },
      nba: {
        version: 'sample',
        generated_at: new Date().toISOString(),
        picks: [
          { away_team: 'BOS', home_team: 'NYK', pick: 'BOS ML', line: -135, confidence: 0.63 }
        ]
      }
    };

    let activeModel = 'mlb';

    function getOrderMode() {
      return localStorage.getItem(MODEL_ORDER_KEY) || 'fixed';
    }

    function setOrderMode(mode) {
      localStorage.setItem(MODEL_ORDER_KEY, mode);
      renderModelTabs();
      loadPredictions();
    }

    function getSeasonalOrder() {
      const m = new Date().getMonth() + 1;
      if (m >= 9 || m <= 2) return ['nfl', 'nba', 'mlb'];
      if (m >= 3 && m <= 6) return ['nba', 'mlb', 'nfl'];
      return ['mlb', 'nfl', 'nba'];
    }

    function getModelOrder() {
      return getOrderMode() === 'seasonal' ? getSeasonalOrder() : ['nfl', 'nba', 'mlb'];
    }

    function renderModelTabs() {
      const container = document.getElementById('model-tabs');
      if (!container) return;

      const mode = getOrderMode();
      const order = getModelOrder();

      container.innerHTML = `
        <div class="model-order-toggle">
          <button class="tab-btn ${mode === 'fixed' ? 'active' : ''}" type="button" id="order-fixed">Fixed</button>
          <button class="tab-btn ${mode === 'seasonal' ? 'active' : ''}" type="button" id="order-seasonal">In-Season</button>
        </div>
        ${order.map(id => {
          const s = MODEL_SOURCES[id];
          return `<button class="tab-btn ${activeModel === id ? 'active' : ''}" type="button" data-model="${id}">${s.emoji} ${s.label}</button>`;
        }).join('')}
      `;

      document.getElementById('order-fixed')?.addEventListener('click', () => setOrderMode('fixed'));
      document.getElementById('order-seasonal')?.addEventListener('click', () => setOrderMode('seasonal'));
      container.querySelectorAll('[data-model]').forEach(btn =>
        btn.addEventListener('click', () => {
          activeModel = btn.dataset.model;
          renderModelTabs();
          loadPredictions();
        })
      );
    }

    async function loadPredictions() {
      const source = MODEL_SOURCES[activeModel];
      const container = document.getElementById('picks-container');
      const infoBar = document.getElementById('model-info-bar');
      const sourceNote = document.getElementById('model-source-note');

      container.innerHTML = `<div class="loading-state" style="grid-column:1/-1"><div class="spinner"></div> Loading ${source.label}...</div>`;

      let data;
      let isSample = false;

      try {
        const res = await fetch(source.url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        data = await res.json();
      } catch {
        data = SAMPLE_DATA[activeModel] || { picks: [] };
        isSample = true;
      }

      if (isSample) {
        sourceNote.innerHTML = `⚠️ <strong>Sample data</strong> — predictions.json not found for ${source.label}.`;
      } else {
        sourceNote.innerHTML = `✅ Live predictions loaded from <strong>Orb-Analytics/${activeModel.toUpperCase()}-Model</strong>.`;
      }

      if (data.generated_at) {
        const d = new Date(data.generated_at);
        document.getElementById('last-updated').textContent =
          `Updated ${d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' })} at ${d.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' })}`;
      }

      infoBar.innerHTML = `
        <div class="model-info-chip">Type: <span>${source.info.type}</span></div>
        <div class="model-info-chip">Features: <span>${source.info.features}</span></div>
        <div class="model-info-chip">Training Data: <span>${source.info.data}</span></div>
        ${data.version ? `<div class="model-info-chip">Version: <span>${data.version}</span></div>` : ''}
      `;

      renderPicks(data.picks || []);
      renderPredictionPerformance();
    }

    function renderPicks(picks) {
      const container = document.getElementById('picks-container');
      const source = MODEL_SOURCES[activeModel];

      if (!picks.length) {
        container.innerHTML = `<div class="no-picks-state"><p>No picks available for ${source.label}.</p></div>`;
        return;
      }

      container.innerHTML = picks.map(pick => {
        const conf = Math.round((pick.confidence || 0.5) * 100);
        const oddsDisplay = pick.line > 0 ? `+${pick.line}` : `${pick.line ?? ''}`;
        return `
          <div class="pick-card">
            <div class="pick-card-header">
              <div class="pick-model-badge">${source.emoji} ${source.label}</div>
              ${conf >= 65 ? `<span class="badge badge-win">HIGH CONF</span>` : ''}
            </div>
            <div class="pick-matchup">${pick.away_team} <span style="color:var(--gray-500);font-weight:400">@</span> ${pick.home_team}</div>
            <div class="pick-main">
              <div class="pick-label">Model Pick</div>
              <div class="pick-value">${pick.pick}</div>
              ${pick.line != null ? `<div style="font-family:var(--font-mono);font-size:0.8rem;color:var(--gray-500);margin-top:0.2rem">Line: ${oddsDisplay}</div>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    function renderPredictionPerformance() {
      const bets = JSON.parse(localStorage.getItem('orb_bets_v1') || '[]');
      const settled = bets.filter(b => b.result && b.result !== 'Pending');
      const wins = settled.filter(b => b.result === 'Win').length;
      const losses = settled.filter(b => b.result === 'Loss').length;
      const pushes = settled.filter(b => b.result === 'Push').length;
      const net = settled.reduce((s, b) => s + (Number(b.pl) || 0), 0);
      const stake = settled.reduce((s, b) => s + (Number(b.stake) || 0), 0);
      const winRate = settled.length ? (wins / settled.length) * 100 : 0;
      const roi = stake ? (net / stake) * 100 : 0;

      const record = document.getElementById('pred-record');
      const wr = document.getElementById('pred-winrate');
      const netEl = document.getElementById('pred-net');
      const roiEl = document.getElementById('pred-roi');
      const body = document.getElementById('pred-history-body');
      if (!record || !wr || !netEl || !roiEl || !body) return;

      record.textContent = `${wins}-${losses}-${pushes}`;
      wr.textContent = `${winRate.toFixed(1)}%`;
      netEl.textContent = `${net >= 0 ? '+' : ''}$${net.toFixed(2)}`;
      roiEl.textContent = `${roi >= 0 ? '+' : ''}${roi.toFixed(1)}%`;

      const recent = [...bets].sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0, 12);
      body.innerHTML = recent.length
        ? recent.map(b => `
          <tr>
            <td>${b.date || '-'}</td>
            <td>${b.sport || '-'}</td>
            <td>${b.pick || '-'}</td>
            <td>${b.odds ?? '-'}</td>
            <td>$${Number(b.stake || 0).toFixed(2)}</td>
            <td>${b.result || 'Pending'}</td>
            <td>${b.pl == null ? '-' : `${b.pl >= 0 ? '+' : ''}$${Number(b.pl).toFixed(2)}`}</td>
          </tr>
        `).join('')
        : `<tr><td colspan="7" style="text-align:center;color:var(--muted)">No tracked bets yet</td></tr>`;
    }

    renderModelTabs();
    loadPredictions();
  </script>
</body>
</html>
