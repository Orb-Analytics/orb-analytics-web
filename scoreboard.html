<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="assets/logo.png" />
  <title>Scoreboard · Orb Analytics</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .scoreboard-header {
      padding: 2rem 0 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .date-display {
      font-family: var(--font-mono);
      color: var(--muted);
      font-size: 0.8rem;
      margin-top: 0.35rem;
    }
    .league-tabs { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
      gap: 1rem;
      padding-bottom: 2rem;
    }
    .game-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: .7rem;
    }
    .game-card-header { display: flex; justify-content: space-between; align-items: center; }
    .game-matchup { font-family: var(--font-display); font-weight: 700; }
    .team-row { display: flex; justify-content: space-between; align-items: center; }
    .team-name { font-weight: 600; }
    .team-score { font-family: var(--font-mono); }
    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .45rem .8rem;
      font-size: .8rem;
      color: var(--muted);
    }
    .meta-grid strong { color: var(--text); }
  </style>
</head>
<body>
  <nav class="nav" id="main-nav"></nav>

  <main class="page">
    <div class="container">
      <div class="scoreboard-header">
        <div>
          <div class="section-label">Live + Context</div>
          <div class="section-title">Scoreboard</div>
          <div class="date-display" id="date-display"></div>
        </div>
      </div>

      <div class="league-tabs">
        <button class="tab-btn active" type="button" data-league="all">All</button>
        <button class="tab-btn" type="button" data-league="nfl">NFL</button>
        <button class="tab-btn" type="button" data-league="nba">NBA</button>
        <button class="tab-btn" type="button" data-league="mlb">MLB</button>
      </div>

      <div class="games-grid" id="games-grid"></div>
    </div>
  </main>

  <footer class="footer">
    <p>Scores + lines context · © 2026 Orb Analytics</p>
  </footer>

  <script src="js/nav.js"></script>
  <script>
    buildNav('scoreboard.html');

    const GAMES = [
      {
        id: '1', league: 'mlb', status: 'Live 7th', date: '2026-07-16',
        away: 'SFG', home: 'LAD', awayScore: 2, homeScore: 4,
        favored: 'LAD', open: -145, close: -162, venue: 'Dodger Stadium', watch: 'ESPN',
        players: ['Shohei Ohtani', 'Mookie Betts', 'Freddie Freeman']
      },
      {
        id: '2', league: 'nba', status: 'Final', date: '2026-07-16',
        away: 'BOS', home: 'NYK', awayScore: 101, homeScore: 97,
        favored: 'BOS', open: -3.5, close: -4.0, venue: 'MSG', watch: 'TNT',
        players: ['Jayson Tatum', 'Jaylen Brown', 'Jalen Brunson']
      }
    ];

    let activeLeague = 'all';

    const fmtLine = (v) => `${Number(v) > 0 ? '+' : ''}${v}`;
    const lineMove = (o, c) => {
      const d = Number(c) - Number(o);
      return `${d > 0 ? '+' : ''}${d.toFixed(1)}`;
    };

    function renderGames() {
      const root = document.getElementById('games-grid');
      const rows = activeLeague === 'all'
        ? GAMES
        : GAMES.filter(g => g.league === activeLeague);

      root.innerHTML = rows.map(g => `
        <article class="game-card">
          <div class="game-card-header">
            <div>
              <div class="section-label">${g.league.toUpperCase()}</div>
              <div class="game-matchup">${g.away} @ ${g.home}</div>
            </div>
            <span class="badge ${g.status.startsWith('Live') ? 'badge-live' : 'badge-final'}">${g.status}</span>
          </div>

          <div class="team-row"><span class="team-name">${g.away}</span><span class="team-score">${g.awayScore}</span></div>
          <div class="team-row"><span class="team-name">${g.home}</span><span class="team-score">${g.homeScore}</span></div>

          <div class="meta-grid">
            <div>Date: <strong>${g.date}</strong></div>
            <div>Favored: <strong>${g.favored}</strong></div>
            <div>Open: <strong>${fmtLine(g.open)}</strong></div>
            <div>Close: <strong>${fmtLine(g.close)}</strong></div>
            <div>Movement: <strong>${lineMove(g.open, g.close)}</strong></div>
            <div>Venue: <strong>${g.venue}</strong></div>
            <div>Watch: <strong>${g.watch}</strong></div>
          </div>

          <div>
            <label class="form-label" for="p-${g.id}">Player stats</label>
            <select id="p-${g.id}" class="form-select">
              ${g.players.map(p => `<option>${p}</option>`).join('')}
            </select>
          </div>
        </article>
      `).join('');
    }

    document.getElementById('date-display').textContent =
      new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

    document.querySelectorAll('[data-league]').forEach(btn => {
      btn.addEventListener('click', () => {
        activeLeague = btn.dataset.league;
        document.querySelectorAll('[data-league]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderGames();
      });
    });

    renderGames();
  </script>
</body>
</html>
