<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scoreboard · Orb Analytics</title>
  <link rel="icon" type="image/png" href="assets/logo.png" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .scoreboard-header {
      padding: 2rem 0 1.5rem;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .date-display {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--gray-500);
      margin-top: 0.3rem;
    }

    /* ── Tabs ──────────────────────────────────────────────────── */
    .league-tabs {
      display: flex;
      gap: 0.35rem;
      flex-wrap: nowrap;
      overflow-x: auto;
      margin-bottom: 1.25rem;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 4px;
    }
    .league-tabs::-webkit-scrollbar { display: none; }
    .league-tab {
      display: flex; align-items: center; gap: 0.4rem;
      padding: 0.45rem 1.1rem;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      background: var(--surface); color: var(--muted);
      font-size: 0.85rem; font-weight: 600; cursor: pointer;
      white-space: nowrap; transition: var(--transition); font-family: var(--font-body);
    }
    .league-tab.active { background: var(--purple-600); border-color: var(--purple-600); color: white; }
    .league-tab:hover:not(.active) { border-color: var(--hover-border); color: var(--text); background: var(--hover-tint); }
    .tab-live-count {
      background: var(--red); color: white;
      font-size: 0.65rem; font-weight: 700;
      padding: 0.1rem 0.4rem; border-radius: var(--radius-pill); line-height: 1.4;
    }

    /* ── Section dividers ──────────────────────────────────────── */
    .section-divider { display: flex; align-items: center; gap: 0.75rem; margin: 1.25rem 0 0.75rem; }
    .sdl { font-family: var(--font-mono); font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; white-space: nowrap; }
    .sdl.live { color: var(--red); display: flex; align-items: center; gap: 0.35rem; }
    .sdl.final { color: var(--gray-600); }
    .sdl-line { flex: 1; height: 1px; background: var(--border); }

    /* ── Games grid ────────────────────────────────────────────── */
    .games-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      padding-bottom: 1rem;
    }
    @media (max-width: 900px) { .games-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 580px) { .games-grid { grid-template-columns: 1fr; } }

    @media (max-width: 580px) {
      .scoreboard-header { padding: 1rem 0 0.75rem; flex-direction: column; align-items: flex-start; gap: 0.75rem; }
      .league-tab { padding: 0.4rem 0.85rem; font-size: 0.8rem; }
      .team-logo { width: 30px; height: 30px; }
      .team-logo-fallback { width: 30px; height: 30px; }
      .team-abbr { font-size: 0.85rem; }
      .team-score { font-size: 1.3rem; }
      .pitcher-name { font-size: 0.78rem; }
      .card-venue { font-size: 0.7rem; }
      .vs-at { font-size: 0.85rem; }
    }

    /* ── Game card ─────────────────────────────────────────────── */
    .game-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1rem 1.1rem;
      display: flex; flex-direction: column; gap: 0.7rem;
      transition: border-color var(--transition), box-shadow var(--transition);
      position: relative; overflow: hidden;
    }
    .game-card:hover { border-color: var(--hover-border); box-shadow: var(--glow); }
    .game-card.live { border-color: rgba(239,68,68,0.3); }
    .game-card.live::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--red), rgba(239,68,68,0.2));
    }

    /* Card header */
    .card-header { display: flex; align-items: center; justify-content: space-between; }
    .card-league { font-family: var(--font-mono); font-size: 0.68rem; color: var(--gray-500); letter-spacing: 0.08em; text-transform: uppercase; }
    .card-status { font-family: var(--font-mono); font-size: 0.75rem; color: var(--gray-500); }
    .card-status.live-text { color: #FCA5A5; display: flex; align-items: center; gap: 0.3rem; }

    /* Side-by-side teams */
    .teams-block { display: flex; align-items: stretch; gap: 0; }

    .team-col {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column; align-items: center;
      gap: 0.3rem; padding: 0.4rem 0.25rem;
      text-align: center;
    }

    .team-logo {
      width: 38px; height: 38px; object-fit: contain; flex-shrink: 0;
    }
    .team-logo-fallback {
      width: 38px; height: 38px; border-radius: var(--radius);
      background: var(--gray-100);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-mono); font-size: 0.6rem; font-weight: 700; color: var(--gray-600);
    }

    .team-abbr {
      font-family: var(--font-display); font-size: 1rem; font-weight: 800;
      white-space: nowrap;
    }
    .team-abbr.winning { color: var(--text); }
    .team-abbr.losing  { color: var(--gray-400); }
    .team-abbr.bold    { font-weight: 900; }

    .team-record { font-family: var(--font-mono); font-size: 0.63rem; color: var(--gray-600); }

    .team-score {
      font-family: var(--font-display); font-size: 1.6rem; font-weight: 800; line-height: 1;
    }
    .team-score.winning { color: var(--text); }
    .team-score.losing  { color: var(--gray-400); }
    .team-score.bold   { font-weight: 900; }

    /* VS column */
    .vs-col {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 0.15rem; flex-shrink: 0; padding: 0 0.4rem;
    }
    .vs-at { font-family: var(--font-display); font-size: 1rem; color: var(--gray-600); font-weight: 400; }

    .team-odds {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.1rem 0.4rem;
      border-radius: var(--radius-pill);
      background: var(--gray-100);
      border: 1px solid var(--border);
      color: var(--gray-700);
      white-space: nowrap;
    }

    .team-odds.pick {
      background: var(--purple-600);
      border-color: var(--purple-600);
      color: white;
    }

    .pitcher-matchup {
      background: var(--gray-50); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 0.55rem 0.75rem;
      display: flex; flex-direction: column; gap: 0.3rem;
    }
    .pitcher-matchup-label {
      font-family: var(--font-mono); font-size: 0.63rem; color: var(--gray-600);
      letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.1rem;
    }
    .pitcher-row { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; }
    .pitcher-team { font-family: var(--font-mono); font-size: 0.65rem; color: var(--gray-600); flex-shrink: 0; min-width: 2rem; }
    .pitcher-name { font-size: 0.82rem; font-weight: 600; color: var(--text); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pitcher-era  { font-family: var(--font-mono); font-size: 0.78rem; font-weight: 600; flex-shrink: 0; }

    /* Card footer */
    .card-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 0.35rem; border-top: 1px solid var(--border); }
    .card-venue { font-size: 0.75rem; color: var(--gray-600); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .card-time  { font-family: var(--font-mono); font-size: 0.75rem; color: var(--gray-600); flex-shrink: 0; }

    /* Refresh */
    .refresh-btn {
      display: flex; align-items: center; gap: 0.4rem;
      background: transparent; border: 1px solid var(--border); border-radius: var(--radius-sm);
      color: var(--gray-600); font-size: 0.8rem; font-family: var(--font-body);
      padding: 0.4rem 0.8rem; cursor: pointer; transition: var(--transition);
    }
    .refresh-btn:hover { color: var(--text); border-color: var(--hover-border); background: var(--hover-tint); }
    .refresh-btn svg { width: 13px; height: 13px; fill: currentColor; }
    .refresh-btn.spinning svg { animation: spin 0.75s linear infinite; }
  </style>
</head>
<body>
  <nav class="nav" id="main-nav"></nav>

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- App layout -->
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="sidebar-content">
  <main class="page">
    <div class="container">
      <div class="scoreboard-header">
        <div style="display:flex;align-items:center;gap:0.75rem">
          <button class="sidebar-toggle" id="sidebar-toggle" style="display:none">
            <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <div>
            <div class="section-label">Live Scores</div>
            <div class="section-title">Scoreboard</div>
            <div class="date-display" id="date-display"></div>
          </div>
        </div>
        <button class="refresh-btn" id="refresh-btn" onclick="doRefresh()">
          <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
          Refresh
        </button>
      </div>

  <!-- Email Signup -->
  <div class="container">
    <div class="email-signup">
      <div class="email-signup-title">Stay Ahead of the Lines</div>

      <div class="email-signup-form">

        <a href="https://orbanalytics.substack.com" target="_blank" class="email-signup-btn">Subscribe</a>

  <footer class="footer">
    <p>Scores via ESPN API · Pitcher data via MLB Stats API · © 2026 Orb Analytics</p>
  </footer>

    </div><!-- end sidebar-content -->
  </div><!-- end app-layout -->

  <script src="js/nav.js"></script>
  <script>
    buildNav('scoreboard.html');

    const LEAGUES = [
      { id:'mlb', label:'MLB', emoji:'⚾', sport:'baseball',   slug:'mlb' },
      { id:'nfl', label:'NFL', emoji:'🏈', sport:'football',   slug:'nfl' },
      { id:'nba', label:'NBA', emoji:'🏀', sport:'basketball', slug:'nba' },
      { id:'nhl', label:'NHL', emoji:'🏒', sport:'hockey',     slug:'nhl' },
    ];

    let activeLeague = 'mlb';
    const cache     = {};
    const eraCache  = {};

    let oddsMap = {}; // "AWAY|HOME" → { awayLine, homeLine, pick }
    // Map ESPN abbrs → model abbrs where they differ
    const ESPN_TO_MODEL = {
      'ATH': 'OAK', 'WAS': 'WSH', 'CWS': 'CHW'
    };
    function toModelAbbr(abbr) {
      return ESPN_TO_MODEL[abbr] || abbr;
    }

    async function fetchOdds() {
      try {
        const res  = await fetch('https://raw.githubusercontent.com/Orb-Analytics/MLB-Model/main/predictions.json');
        const data = await res.json();
        const map  = {};
        for (const pick of data.picks || []) {
          const key = `${pick.away_team}|${pick.home_team}`;
          map[key] = {
            awayLine: pick.away_odds || null,
            homeLine: pick.home_odds || null,
            pick:     pick.pick,
            away:     pick.away_team,
            home:     pick.home_team
          };
        }
        oddsMap = map;
      } catch { oddsMap = {}; }
    }

    document.getElementById('date-display').textContent =
      new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

    // ── Helpers ───────────────────────────────────────────────────
    const isLive  = s => s?.type?.name === 'STATUS_IN_PROGRESS';
    const isFinal = s => s?.type?.name === 'STATUS_FINAL';
    const isPre   = s => s?.type?.state === 'pre';
    const sortOrd = s => isLive(s) ? 0 : isPre(s) ? 1 : 2;

    function eraColor(era) {
      if (era === null || era === undefined) return 'var(--gray-500)';
      const v = parseFloat(era);
      return v < 3.50 ? 'var(--green)' : v > 4.50 ? '#FCA5A5' : 'var(--text)';
    }

    function logoHTML(abbr, league) {
      const url = `https://a.espncdn.com/i/teamlogos/${league}/500/${abbr.toLowerCase()}.png`;
      return `<img class="team-logo" src="${url}" alt="${abbr}"
                onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
              <div class="team-logo-fallback" style="display:none">${abbr.slice(0,3).toUpperCase()}</div>`;
    }

    // ── Fetch ERA ─────────────────────────────────────────────────
    async function fetchERA(id) {
      if (!id) return null;
      if (eraCache[id] !== undefined) return eraCache[id];
      try {
        const r    = await fetch(`https://statsapi.mlb.com/api/v1/people/${id}?hydrate=stats(group=pitching,type=season)`);
        const data = await r.json();
        const era  = data.people?.[0]?.stats?.[0]?.splits?.[0]?.stat?.era ?? null;
        eraCache[id] = era;
        return era;
      } catch { eraCache[id] = null; return null; }
    }

    // ── Fetch probable pitchers → map keyed by venue name ────────
    async function fetchPitchersTagged() {
      const today = new Date().toLocaleDateString('en-CA', { timeZone: 'America/Los_Angeles' });
      try {
        const r    = await fetch(`https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${today}&hydrate=team,probablePitcher,venue`);
        const data = await r.json();
        const map  = {}; // venueName → { away, home, awayAbbr, homeAbbr }
        for (const d of data.dates || []) {
          for (const g of d.games || []) {
            const venueName = g.venue?.name;
            if (venueName) {
              map[venueName] = {
                away: g.teams?.away?.probablePitcher || null,
                home: g.teams?.home?.probablePitcher || null,
                awayAbbr: g.teams?.away?.team?.abbreviation?.toUpperCase(),
                homeAbbr: g.teams?.home?.team?.abbreviation?.toUpperCase(),
              };
            }
          }
        }
        return map;
      } catch { return {}; }
    }

    // ── Build one game card ───────────────────────────────────────
    function buildCard(event, leagueId, pitcherMap) {
      const comp = event.competitions?.[0];
      if (!comp) return '';
      const home = comp.competitors?.find(c => c.homeAway === 'home');
      const away = comp.competitors?.find(c => c.homeAway === 'away');
      if (!home || !away) return '';

      const status = event.status;
      const live   = isLive(status);
      const final  = isFinal(status);
      const pre    = isPre(status);
      const showScore = live || final;

      const homeScore = parseInt(home.score ?? 0);
      const awayScore = parseInt(away.score ?? 0);
      const homeWin = homeScore > awayScore;
      const awayWin = awayScore > homeScore;

      // Status badge
      let statusHTML;
      if (live) {
        statusHTML = `<span class="card-status live-text"><span class="live-dot"></span>${status.type?.detail || 'Live'}</span>`;
      } else if (final) {
        statusHTML = `<span class="card-status">Final</span>`;
      } else {
        const broadcast = comp.broadcasts?.[0]?.names?.join('/') || comp.geoBroadcasts?.[0]?.media?.shortName || '';
        statusHTML = broadcast ? `<span class="card-status" style="color:var(--purple-300)">${broadcast}</span>` : '';
      }

      // Team column
      function teamCol(team, isWin, isLoss, side, oddsLine, isPick) {
        const abbr   = team.team?.abbreviation || '???';
        const record = team.records?.[0]?.summary || '';
        const score  = team.score ?? '';
        const abbrClass  = showScore ? (isWin ? 'winning' : isLoss ? 'losing' : '') : '';
        const scoreClass = live ? '' : isWin ? 'winning' : isLoss ? 'losing' : '';
        const abbrWeight = (final && isWin) ? '800' : (final && isLoss) ? '400' : '600';
        const scoreWeight = (final && isWin) ? '800' : (final && isLoss) ? '500' : '700';
        const fmtOdds = o => o > 0 ? `+${o}` : `${o}`;

        return `<div class="team-col">
          ${logoHTML(abbr, leagueId)}
          <div class="team-abbr ${abbrClass}" style="font-weight:${abbrWeight}">${abbr}</div>
          ${record ? `<div class="team-record">${record}</div>` : ''}
          ${oddsLine != null ? `<div class="team-odds${isPick ? ' pick' : ''}">${fmtOdds(Math.round(oddsLine))}${isPick ? (final && !isWin ? ' ✗' : ' ✓') : ''}</div>` : ''}
          ${showScore ? `<div class="team-score ${scoreClass}" style="font-weight:${scoreWeight}">${score}</div>` : ''}
        </div>`;
      }

      // Look up odds from predictions.json
      const awayAbbr = away.team?.abbreviation?.toUpperCase();
      const homeAbbr = home.team?.abbreviation?.toUpperCase();
      const oddsKey  = `${toModelAbbr(awayAbbr)}|${toModelAbbr(homeAbbr)}`;
      const gameOdds = leagueId === 'mlb' ? (oddsMap[oddsKey] || null) : null;

      // Pitcher matchup (MLB only) — keyed by venue name
      let pitcherHTML = '';
      if (leagueId === 'mlb') {
        const venueName = comp.venue?.fullName;
        const pitchers  = pitcherMap[venueName];
        if (pitchers && (pitchers.away || pitchers.home)) {
          const awayEra = pitchers.away ? eraCache[pitchers.away.id] : null;
          const homeEra = pitchers.home ? eraCache[pitchers.home.id] : null;
          pitcherHTML = `
            <div class="pitcher-matchup">
              <div class="pitcher-matchup-label">Pitching Matchup</div>
              ${pitchers.away ? `<div class="pitcher-row">
                <span class="pitcher-team">${pitchers.awayAbbr || away.team?.abbreviation}</span>
                <span class="pitcher-name">${pitchers.away.fullName}</span>
                <span class="pitcher-era" style="color:${eraColor(awayEra)}">ERA: ${awayEra != null ? parseFloat(awayEra).toFixed(2) : '—'}</span>
              </div>` : ''}
              ${pitchers.home ? `<div class="pitcher-row">
                <span class="pitcher-team">${pitchers.homeAbbr || home.team?.abbreviation}</span>
                <span class="pitcher-name">${pitchers.home.fullName}</span>
                <span class="pitcher-era" style="color:${eraColor(homeEra)}">ERA: ${homeEra != null ? parseFloat(homeEra).toFixed(2) : '—'}</span>
              </div>` : ''}
            </div>`;
        }
      }

      const venue    = comp.venue?.fullName || '';
      const gameDate = event.date ? new Date(event.date).toLocaleDateString('en-US', { month:'short', day:'numeric' }) : '';
      const gameTime = event.date ? new Date(event.date).toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', hour12:true }) : '';

      return `
        <div class="game-card ${live ? 'live' : ''}">
          <div class="card-header">
            <span class="card-league">${leagueId.toUpperCase()}</span>
            ${statusHTML}
          </div>
          <div class="teams-block">
            ${teamCol(away, awayWin, homeWin, 'away', gameOdds?.awayLine, gameOdds?.pick === awayAbbr)}
            <div class="vs-col">
              <span class="vs-at">@</span>
            </div>
            ${teamCol(home, homeWin, awayWin, 'home', gameOdds?.homeLine, gameOdds?.pick === homeAbbr)}
          </div>
          ${pitcherHTML}
          <div class="card-footer">
            <span class="card-venue">${venue}</span>
            <span class="card-time">${gameDate}${pre ? ` · ${gameTime}` : ''}</span>
          </div>
        </div>`;
    }

    // ── Render output ─────────────────────────────────────────────
    function renderOutput(events, leagueId, pitcherMap) {
      const output = document.getElementById('scoreboard-output');

      if (!events.length) {
        output.innerHTML = `<div class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          <p>No ${leagueId.toUpperCase()} games scheduled today.</p>
        </div>`;
        return;
      }

      const sorted   = [...events].sort((a, b) => sortOrd(a.status) - sortOrd(b.status));
      const live     = sorted.filter(e => isLive(e.status));
      const upcoming = sorted.filter(e => isPre(e.status));
      const finals   = sorted.filter(e => isFinal(e.status));

      let html = '';

      if (live.length) {
        html += `<div class="section-divider">
          <span class="sdl live"><span class="live-dot"></span>Live Now</span>
          <div class="sdl-line"></div>
        </div>
        <div class="games-grid">${live.map(e => buildCard(e, leagueId, pitcherMap)).join('')}</div>`;
      }

      if (upcoming.length) {
        html += `<div class="games-grid" style="margin-top:${live.length ? '1.5rem' : '0'}">
          ${upcoming.map(e => buildCard(e, leagueId, pitcherMap)).join('')}
        </div>`;
      }

      if (finals.length) {
        html += `<div class="section-divider" style="margin-top:1rem">
          <span class="sdl final">Final</span>
          <div class="sdl-line"></div>
        </div>
        <div class="games-grid">${finals.map(e => buildCard(e, leagueId, pitcherMap)).join('')}</div>`;
      }

      output.innerHTML = html;

      // Update live count badge
      const liveCount = live.length;
      const tab = document.querySelector(`[data-league="${leagueId}"]`);
      if (tab) {
        const existing = tab.querySelector('.tab-live-count');
        if (existing) existing.remove();
        if (liveCount > 0) {
          const badge = document.createElement('span');
          badge.className = 'tab-live-count';
          badge.textContent = liveCount;
          tab.appendChild(badge);
        }
      }
    }

    // ── Load a league ─────────────────────────────────────────────
    async function loadLeague(leagueId, force = false) {
      const leagueObj = LEAGUES.find(l => l.id === leagueId);
      const output    = document.getElementById('scoreboard-output');

      output.innerHTML = `<div class="loading-state"><div class="spinner"></div> Loading ${leagueObj.label} games...</div>`;

      try {
        let data;
        if (!force && cache[leagueId]) {
          data = cache[leagueId];
        } else {
          const r = await fetch(`https://site.api.espn.com/apis/site/v2/sports/${leagueObj.sport}/${leagueObj.slug}/scoreboard`);
          data = await r.json();
          cache[leagueId] = data;
        }

        const events = data.events || [];
        let pitcherMap = {};

        if (leagueId === 'mlb') {
          [pitcherMap] = await Promise.all([
            fetchPitchersTagged(),
            fetchOdds(),
          ]);
          // Fetch all ERAs in parallel
          const allIds = [];
          Object.values(pitcherMap).forEach(p => {
            if (p.away?.id) allIds.push(p.away.id);
            if (p.home?.id) allIds.push(p.home.id);
          });
          await Promise.all([...new Set(allIds)].map(fetchERA));
        }

        renderOutput(events, leagueId, pitcherMap);

      } catch(err) {
        output.innerHTML = `<div class="empty-state">
          <p>Could not load ${leagueObj.label} scores.</p>
          <button class="btn btn-ghost btn-sm" onclick="loadLeague('${leagueId}',true)" style="margin-top:0.5rem">Try Again</button>
        </div>`;
      }
    }

    // ── Tabs ──────────────────────────────────────────────────────
    function buildTabs() {
      document.getElementById('league-tabs').innerHTML = LEAGUES.map(l => `
        <button class="league-tab ${l.id === activeLeague ? 'active' : ''}" data-league="${l.id}"
                onclick="switchLeague('${l.id}')">
          ${l.emoji} ${l.label}
        </button>`).join('');
    }

    function switchLeague(id) {
      activeLeague = id;
      document.querySelectorAll('.league-tab').forEach(t =>
        t.classList.toggle('active', t.dataset.league === id));
      loadLeague(id);
    }

    // ── Refresh ───────────────────────────────────────────────────
    async function doRefresh() {
      const btn = document.getElementById('refresh-btn');
      btn.classList.add('spinning'); btn.disabled = true;
      delete cache[activeLeague];
      await loadLeague(activeLeague, true);
      btn.classList.remove('spinning'); btn.disabled = false;
    }

    // Auto-refresh every 45s
    setInterval(() => { delete cache[activeLeague]; loadLeague(activeLeague, true); }, 45000);

    // ── Init ──────────────────────────────────────────────────────
    buildTabs();
    loadLeague(activeLeague);
  </script>
</body>
</html>
