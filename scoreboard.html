<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scoreboard · Orb Analytics</title>
  <link rel="icon" type="image/png" href="assets/logo.png" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .scoreboard-header {
      padding: 2rem 0 1.5rem;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .date-display {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--gray-500);
      margin-top: 0.3rem;
    }

    /* ── League tabs ─────────────────────────────────────────── */
    .league-tabs {
      display: flex;
      gap: 0.35rem;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }

    .league-tab {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.45rem 1.1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: var(--transition);
      font-family: var(--font-body);
      position: relative;
    }

    .league-tab.active {
      background: var(--purple-600);
      border-color: var(--purple-600);
      color: white;
      box-shadow: var(--glow);
    }

    .league-tab:hover:not(.active) {
      border-color: var(--purple-500);
      color: var(--text);
      background: rgba(147,51,234,0.1);
    }

    /* Live count badge on tab */
    .tab-live-count {
      background: var(--red);
      color: white;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 0.1rem 0.4rem;
      border-radius: 10px;
      line-height: 1.4;
    }

    /* ── Section dividers ────────────────────────────────────── */
    .section-divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.25rem 0 0.75rem;
    }

    .section-divider-label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .section-divider-label.live { color: #FCA5A5; display: flex; align-items: center; gap: 0.35rem; }
    .section-divider-label.upcoming { color: var(--gray-500); }
    .section-divider-label.final { color: var(--gray-600, #4B5563); }

    .section-divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Games grid ──────────────────────────────────────────── */
    .games-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      padding-bottom: 3rem;
    }

    @media (max-width: 900px) { .games-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) { .games-grid { grid-template-columns: 1fr; } }

    /* ── Game card ───────────────────────────────────────────── */
    .game-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.1rem 1.15rem;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      transition: border-color var(--transition), box-shadow var(--transition);
      position: relative;
      overflow: hidden;
    }

    .game-card:hover {
      border-color: rgba(147,51,234,0.4);
      box-shadow: 0 0 18px rgba(147,51,234,0.12);
    }

    .game-card.live {
      border-color: rgba(239,68,68,0.3);
    }

    .game-card.live::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--red), rgba(239,68,68,0.2));
    }

    /* Card header */
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-league {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--gray-500);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .card-status {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--gray-500);
    }

    .card-status.live-text {
      color: #FCA5A5;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    /* Team rows */
    .teams-block { display: flex; flex-direction: column; gap: 0.5rem; }

    .team-row {
      display: flex;
      align-items: center;
      gap: 0.65rem;
    }

    .team-logo {
      width: 28px;
      height: 28px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .team-logo-fallback {
      width: 28px;
      height: 28px;
      border-radius: 5px;
      background: rgba(147,51,234,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      font-weight: 700;
      color: var(--purple-300);
      flex-shrink: 0;
    }

    .team-name-wrap { flex: 1; min-width: 0; }

    .team-name {
      font-weight: 600;
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .team-record {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--gray-500);
    }

    .team-score {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 700;
      min-width: 2rem;
      text-align: right;
      flex-shrink: 0;
    }

    .team-score.winning { color: var(--text); }
    .team-score.losing  { color: var(--gray-500); }
    .team-score.pre     { color: transparent; font-size: 0; }

    .divider-line {
      height: 1px;
      background: rgba(147,51,234,0.08);
      margin: 0 0.25rem;
    }

    /* Pitcher matchup (MLB only) */
    .pitcher-matchup {
      background: rgba(147,51,234,0.06);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 0.55rem 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .pitcher-matchup-label {
      font-family: var(--font-mono);
      font-size: 0.63rem;
      color: var(--purple-400);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.1rem;
    }

    .pitcher-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .pitcher-name {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pitcher-team {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--gray-500);
      margin-right: 0.3rem;
    }

    .pitcher-era {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      font-weight: 600;
      flex-shrink: 0;
    }

    /* Card footer */
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 0.35rem;
      border-top: 1px solid var(--border);
    }

    .card-venue {
      font-size: 0.75rem;
      color: var(--gray-500);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .card-time {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--purple-300);
      flex-shrink: 0;
    }

    /* Refresh button */
    .refresh-btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--muted);
      font-size: 0.8rem;
      font-family: var(--font-body);
      padding: 0.4rem 0.8rem;
      cursor: pointer;
      transition: var(--transition);
    }

    .refresh-btn:hover { color: var(--text); border-color: var(--purple-500); }
    .refresh-btn svg { width: 13px; height: 13px; fill: currentColor; }
    .refresh-btn.spinning svg { animation: spin 0.75s linear infinite; }
  </style>
</head>
<body>
  <nav class="nav" id="main-nav"></nav>

  <main class="page">
    <div class="container">
      <div class="scoreboard-header">
        <div>
          <div class="section-label">Live Scores</div>
          <div class="section-title">Scoreboard</div>
          <div class="date-display" id="date-display"></div>
        </div>
        <button class="refresh-btn" id="refresh-btn" onclick="refreshAll()">
          <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
          Refresh
        </button>
      </div>

      <!-- League Tabs -->
      <div class="league-tabs" id="league-tabs"></div>

      <!-- Games output -->
      <div id="scoreboard-output">
        <div class="loading-state">
          <div class="spinner"></div> Loading games...
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>Scores via ESPN API · Pitcher data via MLB Stats API · © 2026 Orb Analytics</p>
  </footer>

  <script src="js/nav.js"></script>
  <script>
    buildNav('scoreboard.html');

    // ── League config ─────────────────────────────────────────────
    const LEAGUES = [
      { id: 'mlb',  label: 'MLB',  emoji: '⚾', sport: 'baseball',   slug: 'mlb' },
      { id: 'nfl',  label: 'NFL',  emoji: '🏈', sport: 'football',   slug: 'nfl' },
      { id: 'nba',  label: 'NBA',  emoji: '🏀', sport: 'basketball', slug: 'nba' },
      { id: 'nhl',  label: 'NHL',  emoji: '🏒', sport: 'hockey',     slug: 'nhl' },
    ];

    let activeLeague = 'mlb';

    // Cache fetched data per league
    const cache = {};
    // Cache pitcher ERA per pitcher id
    const eraCache = {};

    // ── Team logo map ─────────────────────────────────────────────
    const TEAM_ESPN = {
      ari:'ari', atl:'atl', bal:'bal', bos:'bos', chc:'chc',
      cin:'cin', cle:'cle', col:'col', cws:'cws', det:'det',
      hou:'hou', kc:'kc',  laa:'laa', lad:'lad', mia:'mia',
      mil:'mil', min:'min', nym:'nym', nyy:'nyy', oak:'oak',
      phi:'phi', pit:'pit', sd:'sd',  sea:'sea', sf:'sf',
      stl:'stl', tb:'tb',  tex:'tex', tor:'tor', wsh:'wsh',
      // NFL
      buf:'buf', mia_nfl:'mia', ne:'ne',  nyj:'nyj', bal_nfl:'bal',
      // NBA / NHL — logos still work by abbreviation
    };

    function teamLogoURL(abbr, league) {
      const a = abbr.toLowerCase();
      const sportMap = { mlb:'mlb', nfl:'nfl', nba:'nba', nhl:'nhl' };
      const sport = sportMap[league] || 'mlb';
      return `https://a.espncdn.com/i/teamlogos/${sport}/500/${a}.png`;
    }

    function logoHTML(abbr, league) {
      const url = teamLogoURL(abbr, league);
      return `
        <img class="team-logo" src="${url}" alt="${abbr}"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="team-logo-fallback" style="display:none">${abbr.slice(0,3).toUpperCase()}</div>`;
    }

    // ── Date display ──────────────────────────────────────────────
    document.getElementById('date-display').textContent =
      new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

    // ── Fetch ERA for a pitcher id ────────────────────────────────
    async function fetchERA(id) {
      if (eraCache[id] !== undefined) return eraCache[id];
      try {
        const res  = await fetch(`https://statsapi.mlb.com/api/v1/people/${id}?hydrate=stats(group=pitching,type=season)`);
        const data = await res.json();
        const era  = data.people?.[0]?.stats?.[0]?.splits?.[0]?.stat?.era ?? null;
        eraCache[id] = era;
        return era;
      } catch { eraCache[id] = null; return null; }
    }

    // ── Fetch probable pitchers for today keyed by game_pk ────────
    async function fetchPitchers() {
      const today = new Date().toISOString().split('T')[0];
      try {
        const res  = await fetch(`https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${today}&hydrate=team,probablePitcher`);
        const data = await res.json();
        const map  = {}; // gamePk → { away, home }
        for (const d of data.dates || []) {
          for (const g of d.games || []) {
            map[g.gamePk] = {
              away: g.teams?.away?.probablePitcher || null,
              home: g.teams?.home?.probablePitcher || null,
            };
          }
        }
        return map;
      } catch { return {}; }
    }

    // ── Fetch ESPN scoreboard ─────────────────────────────────────
    async function fetchLeague(leagueObj) {
      const url = `https://site.api.espn.com/apis/site/v2/sports/${leagueObj.sport}/${leagueObj.slug}/scoreboard`;
      const res  = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    // ── Game status helpers ───────────────────────────────────────
    function isLive(status)   { return status?.type?.name === 'STATUS_IN_PROGRESS'; }
    function isFinal(status)  { return status?.type?.name === 'STATUS_FINAL'; }
    function isPre(status)    { return status?.type?.state === 'pre'; }

    function statusOrder(status) {
      if (isLive(status))  return 0;
      if (isFinal(status)) return 2;
      return 1; // pre
    }

    // ── ERA color ─────────────────────────────────────────────────
    function eraColor(era) {
      if (era === null) return 'var(--gray-500)';
      const v = parseFloat(era);
      if (v < 3.50) return 'var(--green)';
      if (v > 4.50) return '#FCA5A5';
      return 'var(--text)';
    }

    // ── Build a single game card ──────────────────────────────────
    function buildCard(event, leagueId, pitcherMap) {
      const comp = event.competitions?.[0];
      if (!comp) return '';

      const competitors = comp.competitors || [];
      const home = competitors.find(c => c.homeAway === 'home') || competitors[0];
      const away = competitors.find(c => c.homeAway === 'away') || competitors[1];
      if (!home || !away) return '';

      const status = event.status;
      const live   = isLive(status);
      const final  = isFinal(status);
      const pre    = isPre(status);

      const homeScore = parseInt(home.score ?? 0);
      const awayScore = parseInt(away.score ?? 0);
      const homeWin   = homeScore > awayScore;
      const awayWin   = awayScore > homeScore;

      // Status display
      let statusHTML = '';
      if (live) {
        statusHTML = `<span class="card-status live-text"><span class="live-dot"></span>${status.type?.detail || 'Live'}</span>`;
      } else if (final) {
        statusHTML = `<span class="card-status">Final</span>`;
      } else {
        const t = event.date
          ? new Date(event.date).toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', hour12:true })
          : status.type?.detail || '';
        statusHTML = `<span class="card-status" style="color:var(--purple-300)">${t}</span>`;
      }

      // Team row builder
      function teamRow(team, isWinning, isLosing) {
        const abbr   = team.team?.abbreviation || '???';
        const name   = team.team?.shortDisplayName || team.team?.displayName || abbr;
        const record = team.records?.[0]?.summary || '';
        const score  = team.score ?? '';
        const scoreClass = (live || final)
          ? (isWinning ? 'winning' : isLosing ? 'losing' : '')
          : 'pre';

        return `
          <div class="team-row">
            ${logoHTML(abbr, leagueId)}
            <div class="team-name-wrap">
              <div class="team-name">${name}</div>
              ${record ? `<div class="team-record">${record}</div>` : ''}
            </div>
            <div class="team-score ${scoreClass}">${(live || final) ? score : ''}</div>
          </div>`;
      }

      // Pitcher matchup (MLB only)
      let pitcherHTML = '';
      if (leagueId === 'mlb' && pitcherMap) {
        // Match by ESPN game id → gamePk via venue/team cross-reference
        // We stored pitcherMap by gamePk; try to find by home team abbr
        const homeAbbr = home.team?.abbreviation?.toLowerCase();
        const pitchers = Object.values(pitcherMap).find(p => {
          // We'll match by injected data-gamepk attribute later; for now use cached map
          return p._homeAbbr === homeAbbr;
        });

        const awayP = pitcherMap[event._gamePk]?.away;
        const homeP = pitcherMap[event._gamePk]?.home;

        if (awayP || homeP) {
          const awayEra = eraCache[awayP?.id] ?? null;
          const homeEra = eraCache[homeP?.id] ?? null;

          pitcherHTML = `
            <div class="pitcher-matchup">
              <div class="pitcher-matchup-label">Pitching Matchup</div>
              ${awayP ? `
                <div class="pitcher-row">
                  <span class="pitcher-team">${away.team?.abbreviation}</span>
                  <span class="pitcher-name">${awayP.fullName}</span>
                  <span class="pitcher-era" style="color:${eraColor(awayEra)}">ERA: ${awayEra !== null ? parseFloat(awayEra).toFixed(2) : '—'}</span>
                </div>` : ''}
              ${homeP ? `
                <div class="pitcher-row">
                  <span class="pitcher-team">${home.team?.abbreviation}</span>
                  <span class="pitcher-name">${homeP.fullName}</span>
                  <span class="pitcher-era" style="color:${eraColor(homeEra)}">ERA: ${homeEra !== null ? parseFloat(homeEra).toFixed(2) : '—'}</span>
                </div>` : ''}
            </div>`;
        }
      }

      const venue = comp.venue?.fullName || '';
      const gameTime = event.date
        ? new Date(event.date).toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', hour12:true })
        : '';

      return `
        <div class="game-card ${live ? 'live' : ''}">
          <div class="card-header">
            <span class="card-league">${leagueId.toUpperCase()}</span>
            ${statusHTML}
          </div>

          <div class="teams-block">
            ${teamRow(away, awayWin, homeWin)}
            <div class="divider-line"></div>
            ${teamRow(home, homeWin, awayWin)}
          </div>

          ${pitcherHTML}

          <div class="card-footer">
            <span class="card-venue">${venue}</span>
            ${pre ? `<span class="card-time">${gameTime}</span>` : ''}
          </div>
        </div>`;
    }

    // ── Render all games for active league ────────────────────────
    function renderOutput(events, leagueId, pitcherMap) {
      const output = document.getElementById('scoreboard-output');

      if (!events.length) {
        output.innerHTML = `
          <div class="empty-state">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <p>No ${leagueId.toUpperCase()} games scheduled today.</p>
          </div>`;
        return;
      }

      // Sort: live first, then upcoming, then final
      const sorted = [...events].sort((a, b) =>
        statusOrder(a.status) - statusOrder(b.status)
      );

      const liveGames     = sorted.filter(e => isLive(e.status));
      const upcomingGames = sorted.filter(e => isPre(e.status));
      const finalGames    = sorted.filter(e => isFinal(e.status));

      let html = '';

      if (liveGames.length) {
        html += `
          <div class="section-divider">
            <span class="section-divider-label live"><span class="live-dot"></span>Live Now</span>
            <div class="section-divider-line"></div>
          </div>
          <div class="games-grid">`;
        html += liveGames.map(e => buildCard(e, leagueId, pitcherMap)).join('');
        html += '</div>';
      }

      if (upcomingGames.length) {
        html += `<div class="games-grid" style="margin-top:${liveGames.length ? '1.5rem' : '0'}">`;
        html += upcomingGames.map(e => buildCard(e, leagueId, pitcherMap)).join('');
        html += '</div>';
      }

      if (finalGames.length) {
        html += `
          <div class="section-divider" style="margin-top:1rem">
            <span class="section-divider-label final">Final</span>
            <div class="section-divider-line"></div>
          </div>
          <div class="games-grid">`;
        html += finalGames.map(e => buildCard(e, leagueId, pitcherMap)).join('');
        html += '</div>';
      }

      output.innerHTML = html;
    }

    // ── Load scores for a league ──────────────────────────────────
    async function loadLeague(leagueId, force = false) {
      const leagueObj = LEAGUES.find(l => l.id === leagueId);
      const output    = document.getElementById('scoreboard-output');

      output.innerHTML = `<div class="loading-state"><div class="spinner"></div> Loading ${leagueObj.label} games...</div>`;

      try {
        let data;
        if (!force && cache[leagueId]) {
          data = cache[leagueId];
        } else {
          data = await fetchLeague(leagueObj);
          cache[leagueId] = data;
        }

        let events = data.events || [];

        // For MLB, fetch pitchers + ERAs
        let pitcherMap = {};
        if (leagueId === 'mlb') {
          pitcherMap = await fetchPitchers();

          // Tag each ESPN event with its gamePk by matching home team abbreviation
          events = events.map(event => {
            const comp = event.competitions?.[0];
            const homeAbbr = comp?.competitors?.find(c => c.homeAway === 'home')?.team?.abbreviation?.toLowerCase();
            // Find matching gamePk in pitcherMap by home team abbr
            const matchedPk = Object.keys(pitcherMap).find(pk => {
              // We'll match by storing _homeAbbr when we built the map
              return pitcherMap[pk]._homeAbbr === homeAbbr;
            });
            return { ...event, _gamePk: matchedPk };
          });

          // Fetch ERA for all pitchers in parallel
          const allPitcherIds = [];
          Object.values(pitcherMap).forEach(p => {
            if (p.away?.id) allPitcherIds.push(p.away.id);
            if (p.home?.id) allPitcherIds.push(p.home.id);
          });
          await Promise.all([...new Set(allPitcherIds)].map(id => fetchERA(id)));
        }

        renderOutput(events, leagueId, pitcherMap);
        updateTabCounts(leagueId, events);

      } catch(err) {
        output.innerHTML = `
          <div class="empty-state">
            <p>Could not load ${leagueObj.label} scores. Check your connection.</p>
            <button class="btn btn-ghost btn-sm" onclick="loadLeague('${leagueId}', true)" style="margin-top:0.5rem">Try Again</button>
          </div>`;
      }
    }

    // ── Update live count badge on tabs ───────────────────────────
    function updateTabCounts(leagueId, events) {
      const liveCount = events.filter(e => isLive(e.status)).length;
      const tab = document.querySelector(`[data-league="${leagueId}"]`);
      if (!tab) return;
      const existing = tab.querySelector('.tab-live-count');
      if (existing) existing.remove();
      if (liveCount > 0) {
        const badge = document.createElement('span');
        badge.className = 'tab-live-count';
        badge.textContent = liveCount;
        tab.appendChild(badge);
      }
    }

    // ── Build tabs ────────────────────────────────────────────────
    function buildTabs() {
      const container = document.getElementById('league-tabs');
      container.innerHTML = LEAGUES.map(l => `
        <button class="league-tab ${l.id === activeLeague ? 'active' : ''}"
                data-league="${l.id}"
                onclick="switchLeague('${l.id}')">
          ${l.emoji} ${l.label}
        </button>`).join('');
    }

    function switchLeague(id) {
      activeLeague = id;
      document.querySelectorAll('.league-tab').forEach(t => {
        t.classList.toggle('active', t.dataset.league === id);
      });
      loadLeague(id);
    }

    // ── Refresh ───────────────────────────────────────────────────
    async function refreshAll() {
      const btn = document.getElementById('refresh-btn');
      btn.classList.add('spinning');
      btn.disabled = true;
      delete cache[activeLeague];
      await loadLeague(activeLeague, true);
      btn.classList.remove('spinning');
      btn.disabled = false;
    }

    // ── Fetch pitchers with home team abbr tagging ────────────────
    // Override fetchPitchers to tag each entry with _homeAbbr
    const _origFetchPitchers = fetchPitchers;
    async function fetchPitchersTagged() {
      const today = new Date().toISOString().split('T')[0];
      try {
        const res  = await fetch(`https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${today}&hydrate=team,probablePitcher`);
        const data = await res.json();
        const map  = {};
        for (const d of data.dates || []) {
          for (const g of d.games || []) {
            const homeAbbr = g.teams?.home?.team?.abbreviation?.toLowerCase();
            map[g.gamePk] = {
              away: g.teams?.away?.probablePitcher || null,
              home: g.teams?.home?.probablePitcher || null,
              _homeAbbr: homeAbbr,
            };
          }
        }
        return map;
      } catch { return {}; }
    }

    // ── Override loadLeague to use tagged pitcher fetch ───────────
    const _origLoadLeague = loadLeague;

    // Patch: use tagged pitcher fetcher
    async function loadLeagueFull(leagueId, force = false) {
      const leagueObj = LEAGUES.find(l => l.id === leagueId);
      const output    = document.getElementById('scoreboard-output');

      output.innerHTML = `<div class="loading-state"><div class="spinner"></div> Loading ${leagueObj.label} games...</div>`;

      try {
        let data;
        if (!force && cache[leagueId]) {
          data = cache[leagueId];
        } else {
          data = await fetchLeague(leagueObj);
          cache[leagueId] = data;
        }

        let events = data.events || [];
        let pitcherMap = {};

        if (leagueId === 'mlb') {
          pitcherMap = await fetchPitchersTagged();

          // Tag ESPN events with matching gamePk
          events = events.map(event => {
            const comp     = event.competitions?.[0];
            const homeAbbr = comp?.competitors
              ?.find(c => c.homeAway === 'home')
              ?.team?.abbreviation?.toLowerCase();

            const matchedPk = Object.keys(pitcherMap).find(
              pk => pitcherMap[pk]._homeAbbr === homeAbbr
            );
            return { ...event, _gamePk: matchedPk };
          });

          // Fetch ERA for all pitchers in parallel
          const allIds = [];
          Object.values(pitcherMap).forEach(p => {
            if (p.away?.id) allIds.push(p.away.id);
            if (p.home?.id) allIds.push(p.home.id);
          });
          await Promise.all([...new Set(allIds)].map(id => fetchERA(id)));
        }

        renderOutput(events, leagueId, pitcherMap);
        updateTabCounts(leagueId, events);

      } catch(err) {
        output.innerHTML = `
          <div class="empty-state">
            <p>Could not load ${leagueObj.label} scores.</p>
            <button class="btn btn-ghost btn-sm" onclick="init('${leagueId}')" style="margin-top:0.5rem">Try Again</button>
          </div>`;
      }
    }

    // ── Override switchLeague + refreshAll to use patched loader ──
    function switchLeague(id) {
      activeLeague = id;
      document.querySelectorAll('.league-tab').forEach(t => {
        t.classList.toggle('active', t.dataset.league === id);
      });
      loadLeagueFull(id);
    }

    async function refreshAll() {
      const btn = document.getElementById('refresh-btn');
      btn.classList.add('spinning');
      btn.disabled = true;
      delete cache[activeLeague];
      await loadLeagueFull(activeLeague, true);
      btn.classList.remove('spinning');
      btn.disabled = false;
    }

    // ── Auto-refresh live games every 45s ─────────────────────────
    setInterval(() => {
      delete cache[activeLeague];
      loadLeagueFull(activeLeague, true);
    }, 45000);

    // ── Init ──────────────────────────────────────────────────────
    buildTabs();
    loadLeagueFull(activeLeague);
  </script>
</body>
</html>
