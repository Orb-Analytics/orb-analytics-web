<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="icon" type="image/png" href="assets/logo.png" />
  <title>Bankroll · Orb Analytics</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav class="nav" id="main-nav"></nav>

  <main class="page">
    <div class="container" style="padding:2rem 0 3rem">
      <div class="section-label">Performance</div>
      <div class="section-title">Bankroll Tracker</div>

      <div class="card" style="margin-top:1rem">
        <form id="bet-form" style="display:grid;grid-template-columns:repeat(6,minmax(120px,1fr));gap:.65rem;align-items:end">
          <div class="form-group"><label class="form-label">Date</label><input class="form-input" id="bet-date" type="date" required></div>
          <div class="form-group"><label class="form-label">Sport</label><input class="form-input" id="bet-sport" placeholder="MLB" required></div>
          <div class="form-group"><label class="form-label">Pick</label><input class="form-input" id="bet-pick" placeholder="LAD ML" required></div>
          <div class="form-group"><label class="form-label">Odds</label><input class="form-input" id="bet-odds" type="number" required></div>
          <div class="form-group"><label class="form-label">Stake</label><input class="form-input" id="bet-stake" type="number" step="0.01" required></div>
          <div class="form-group"><label class="form-label">Result</label>
            <select class="form-select" id="bet-result">
              <option>Pending</option><option>Win</option><option>Loss</option><option>Push</option>
            </select>
          </div>
          <button class="btn btn-primary" type="submit">Add Bet</button>
          <button class="btn btn-ghost" type="button" id="clear-bets">Clear All</button>
        </form>
      </div>

      <div class="cards-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem;margin-top:1rem">
        <div class="stat-card"><div class="stat-label">Record</div><div class="stat-value" id="bk-record">0-0-0</div></div>
        <div class="stat-card"><div class="stat-label">Win Rate</div><div class="stat-value" id="bk-winrate">0.0%</div></div>
        <div class="stat-card"><div class="stat-label">Net P/L</div><div class="stat-value" id="bk-net">$0.00</div></div>
        <div class="stat-card"><div class="stat-label">ROI</div><div class="stat-value" id="bk-roi">0.0%</div></div>
      </div>

      <div class="card" style="margin-top:1rem;overflow:auto">
        <table class="data-table">
          <thead><tr><th>Date</th><th>Sport</th><th>Pick</th><th>Odds</th><th>Stake</th><th>Result</th><th>P/L</th></tr></thead>
          <tbody id="bk-history"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="js/nav.js"></script>
  <script>
    buildNav('tracker.html');

    const KEY = 'orb_bets_v1';
    const getBets = () => JSON.parse(localStorage.getItem(KEY) || '[]');
    const setBets = (bets) => localStorage.setItem(KEY, JSON.stringify(bets));

    function calcPL(odds, stake, result) {
      const o = Number(odds), s = Number(stake);
      if (result === 'Win') return o > 0 ? (s * (o / 100)) : (s * (100 / Math.abs(o)));
      if (result === 'Loss') return -s;
      return 0;
    }

    function render() {
      const bets = getBets();
      const settled = bets.filter(b => b.result !== 'Pending');
      const wins = settled.filter(b => b.result === 'Win').length;
      const losses = settled.filter(b => b.result === 'Loss').length;
      const pushes = settled.filter(b => b.result === 'Push').length;
      const net = settled.reduce((s,b) => s + (Number(b.pl) || 0), 0);
      const stake = settled.reduce((s,b) => s + Number(b.stake || 0), 0);
      const winRate = settled.length ? (wins / settled.length) * 100 : 0;
      const roi = stake ? (net / stake) * 100 : 0;

      document.getElementById('bk-record').textContent = `${wins}-${losses}-${pushes}`;
      document.getElementById('bk-winrate').textContent = `${winRate.toFixed(1)}%`;
      document.getElementById('bk-net').textContent = `${net >= 0 ? '+' : ''}$${net.toFixed(2)}`;
      document.getElementById('bk-roi').textContent = `${roi >= 0 ? '+' : ''}${roi.toFixed(1)}%`;

      document.getElementById('bk-history').innerHTML = bets.length ? [...bets].reverse().map(b => `
        <tr>
          <td>${b.date}</td><td>${b.sport}</td><td>${b.pick}</td><td>${b.odds}</td>
          <td>$${Number(b.stake).toFixed(2)}</td><td>${b.result}</td>
          <td>${b.pl === null ? '-' : `${b.pl >= 0 ? '+' : ''}$${Number(b.pl).toFixed(2)}`}</td>
        </tr>
      `).join('') : `<tr><td colspan="7" style="text-align:center;color:var(--muted)">No bets tracked yet</td></tr>`;
    }

    document.getElementById('bet-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const date = document.getElementById('bet-date').value;
      const sport = document.getElementById('bet-sport').value.trim();
      const pick = document.getElementById('bet-pick').value.trim();
      const odds = Number(document.getElementById('bet-odds').value);
      const stake = Number(document.getElementById('bet-stake').value);
      const result = document.getElementById('bet-result').value;
      const pl = result === 'Pending' ? null : Number(calcPL(odds, stake, result).toFixed(2));

      const bets = getBets();
      bets.push({ date, sport, pick, odds, stake, result, pl });
      setBets(bets);
      e.target.reset();
      render();
    });

    document.getElementById('clear-bets').addEventListener('click', () => {
      localStorage.removeItem(KEY);
      render();
    });

    render();
  </script>
</body>
</html>
